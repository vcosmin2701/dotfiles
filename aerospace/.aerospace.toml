# AeroSpace configuration
# Docs: https://nikitabobko.github.io/AeroSpace/guide
# Main modifier: Cmd+Ctrl  |  Nav: vim (h/j/k/l)

config-version = 2

# Run after AeroSpace startup: make sure SketchyBar is up
after-startup-command = ['exec-and-forget sketchybar']

# Notify SketchyBar every time the focused workspace changes
exec-on-workspace-change = [
  '/bin/bash', '-c',
  '/opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change',
]

# Start AeroSpace at login
start-at-login = true

# Normalizations keep the tree tidy
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Layout when opening the first window in an empty workspace
default-root-container-layout = 'tiles'
# 'auto' picks horizontal/vertical based on monitor aspect ratio
default-root-container-orientation = 'auto'

# Mouse follows focus (and vice versa) when switching monitors/windows
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# Don't hide macOS menu bar / keep native fullscreen behavior sane
automatically-unhide-macos-hidden-apps = false

# ---------------------------------------------------------------------------
# Gaps
# ---------------------------------------------------------------------------
[gaps]
inner.horizontal = 8
inner.vertical   = 8
outer.left       = 8
outer.bottom     = 8
outer.right      = 8
# Reserve room for the SketchyBar (bar height 32 + a little breathing room).
# Per-monitor: external DELL has no macOS menu-bar offset, so it needs the full
# bar height; the built-in laptop display already reserves the menu-bar strip.
outer.top = [
  { monitor.'DELL P3425WE' = 40 },   # external Dell on the other laptop
  { monitor.'DELL SE2723DS' = 40 },  # external Dell on this laptop
  { monitor.'built-in'     = 8  },
  40,  # fallback for any other external monitor
]

# ---------------------------------------------------------------------------
# Main mode — the default keybindings
# ---------------------------------------------------------------------------
[mode.main.binding]

# Focus windows (vim)
cmd-ctrl-h = 'focus left'
cmd-ctrl-j = 'focus down'
cmd-ctrl-k = 'focus up'
cmd-ctrl-l = 'focus right'

# Move windows within the tree
cmd-shift-h = 'move left'
cmd-shift-j = 'move down'
cmd-shift-k = 'move up'
cmd-shift-l = 'move right'

# Resize the focused window
cmd-ctrl-minus  = 'resize smart -50'
cmd-ctrl-equal  = 'resize smart +50'

# Layout toggles
cmd-ctrl-slash = 'layout tiles horizontal vertical'   # toggle tiling orientation
cmd-ctrl-comma = 'layout accordion horizontal vertical' # toggle accordion
cmd-ctrl-f     = 'layout floating tiling'             # toggle float for focused window
cmd-ctrl-m     = 'fullscreen'                          # native-ish fullscreen (single window)
cmd-ctrl-c     = 'exec-and-forget $HOME/.config/aerospace/center-window.sh'  # float + center

# Workspaces: focus 1..9 and 0
cmd-ctrl-1 = 'workspace 1'
cmd-ctrl-2 = 'workspace 2'
cmd-ctrl-3 = 'workspace 3'
cmd-ctrl-4 = 'workspace 4'
cmd-ctrl-5 = 'workspace 5'
cmd-ctrl-6 = 'workspace 6'
cmd-ctrl-7 = 'workspace 7'
cmd-ctrl-8 = 'workspace 8'
cmd-ctrl-9 = 'workspace 9'
cmd-ctrl-0 = 'workspace 10'

# Move focused window to workspace 1..9 and 0 (Alt + number, follows the window)
alt-1 = ['move-node-to-workspace 1', 'workspace 1']
alt-2 = ['move-node-to-workspace 2', 'workspace 2']
alt-3 = ['move-node-to-workspace 3', 'workspace 3']
alt-4 = ['move-node-to-workspace 4', 'workspace 4']
alt-5 = ['move-node-to-workspace 5', 'workspace 5']
alt-6 = ['move-node-to-workspace 6', 'workspace 6']
alt-7 = ['move-node-to-workspace 7', 'workspace 7']
alt-8 = ['move-node-to-workspace 8', 'workspace 8']
alt-9 = ['move-node-to-workspace 9', 'workspace 9']
alt-0 = ['move-node-to-workspace 10', 'workspace 10']

# Quick toggle between the two most recent workspaces
cmd-ctrl-tab = 'workspace-back-and-forth'

# Join focused window with a neighbor (build a nested container)
cmd-ctrl-shift-left  = 'join-with left'
cmd-ctrl-shift-down  = 'join-with down'
cmd-ctrl-shift-up    = 'join-with up'
cmd-ctrl-shift-right = 'join-with right'

# Reload config after edits
cmd-ctrl-shift-c = 'reload-config'

# Enter service mode (see below)
cmd-ctrl-semicolon = 'mode service'

# Enter resize mode
cmd-ctrl-r = 'mode resize'

# ---------------------------------------------------------------------------
# Service mode — housekeeping actions, press esc to leave
# ---------------------------------------------------------------------------
[mode.service.binding]
esc = ['reload-config', 'mode main']
r   = ['flatten-workspace-tree', 'mode main']   # reset the layout tree
f   = ['layout floating tiling', 'mode main']   # toggle floating
backspace = ['close-all-windows-but-current', 'mode main']

# Rejoin windows into a container
cmd-ctrl-shift-h = ['join-with left', 'mode main']
cmd-ctrl-shift-j = ['join-with down', 'mode main']
cmd-ctrl-shift-k = ['join-with up', 'mode main']
cmd-ctrl-shift-l = ['join-with right', 'mode main']

# ---------------------------------------------------------------------------
# Resize mode — h/j/k/l to resize, esc/enter to leave
# ---------------------------------------------------------------------------
[mode.resize.binding]
h = 'resize width -50'
j = 'resize height +50'
k = 'resize height -50'
l = 'resize width +50'
minus = 'resize smart -50'
equal = 'resize smart +50'
enter = 'mode main'
esc   = 'mode main'

# ---------------------------------------------------------------------------
# Window rules — force certain apps to float
# ---------------------------------------------------------------------------
[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.finder'
if.window-title-regex-substring = 'Info|Copy|Move'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.ActivityMonitor'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.calculator'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.archiveutility'
run = 'layout floating'

# ---------------------------------------------------------------------------
# Workspace window limit — keep at most 3 tiled windows per workspace.
# This catch-all runs LAST: AeroSpace stops at the first matching rule, so the
# float rules above are handled first (floating windows don't count toward the
# tile limit). Any normal window falls through to here. The script counts the
# windows already on the target workspace and, if it's full, relocates this new
# window to the next free workspace so the existing layout is left intact.
# ---------------------------------------------------------------------------
[[on-window-detected]]
if = 'true'
run = 'exec-and-forget /bin/bash $HOME/.config/aerospace/limit-windows.sh'
